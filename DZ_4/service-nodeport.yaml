apiVersion: v1
kind: Service
metadata:
  name: nginx-nodeport
spec:
  type: NodePort
  selector:
    app: multi-app   # тот же selector, что и у Deployment
  ports:
  - protocol: TCP
    port: 80          # порт, по которому сервис будет доступен внутри кластера
    targetPort: 80    # порт контейнера nginx
    nodePort: 30080   # порт на каждом узле кластера (диапазон 30000-32767)
