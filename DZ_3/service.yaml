apiVersion: v1
kind: Service
metadata:
  name: nginx-multitool-service
spec:
  selector:
    app: nginx-multitool   # Должен совпадать с labels в Deployment
  ports:
  - name: nginx-http
    protocol: TCP
    port: 80
    targetPort: 80
  - name: multitool-http
    protocol: TCP
    port: 1180
    targetPort: 1180
